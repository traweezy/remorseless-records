    peerDependencies:
      "@types/react": "*"
    peerDependenciesMeta:
      "@types/react":
        optional: true
  "@medusajs/ui@4.2.0":
    peerDependencies:
      "@types/react": "*"
      "@types/react-dom": "*"
    peerDependenciesMeta:
      "@types/react":
        optional: true
      "@types/react-dom":
        optional: true
  "lucide-react@1.25.0":
    peerDependencies:
      "@types/react": "*"
    peerDependenciesMeta:
      "@types/react":
        optional: true
  "next@16.2.11":
    peerDependencies:
      "@types/react": "*"
      "@types/react-dom": "*"
    peerDependenciesMeta:
      "@types/react":
        optional: true
      "@types/react-dom":
        optional: true

