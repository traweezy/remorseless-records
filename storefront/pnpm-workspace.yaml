  "@swc/core": true
  esbuild: true
  lefthook: true
  msgpackr-extract: true
  protobufjs: true
  puppeteer: true
  sharp: true
  unrs-resolver: true

resolvePeersFromWorkspaceRoot: false

packageExtensions:
