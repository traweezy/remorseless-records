name: Pinned Gitleaks scan
description: Download, verify, and run the standalone Gitleaks CLI

runs:
  using: composite
  steps:
    - name: Download and verify Gitleaks
      shell: bash
      env:
        GITLEAKS_VERSION: 8.30.1
        GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
      run: |
        set -euo pipefail

        archive="$RUNNER_TEMP/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        install_dir="$RUNNER_TEMP/gitleaks-${GITLEAKS_VERSION}"
        download_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"

        curl \
          --fail \
          --location \
          --retry 3 \
          --retry-all-errors \
          --retry-delay 2 \
          --connect-timeout 10 \
          --max-time 120 \
          --output "$archive" \
          "$download_url"
        echo "$GITLEAKS_LINUX_X64_SHA256  $archive" | sha256sum --check --

        mkdir -p "$install_dir"
        tar -xzf "$archive" -C "$install_dir" gitleaks

        cd "$GITHUB_WORKSPACE"
        "$install_dir/gitleaks" git --redact --no-banner --verbose .
